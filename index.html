<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumEdit Pro - Ultra Lite Engine</title>
    <style>
        :root {
            --bg-main: #09090b;
            --bg-panel: #141417;
            --bg-surface: #222226;
            --accent-blue: #0a84ff;
            --accent-purple: #bf5af2;
            --text-main: #f4f4f5;
            --text-muted: #8e8e93;
            --border: #2c2c2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-toolbar { height: 50px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .mode-switch-group { display: flex; background-color: var(--bg-main); padding: 2px; border-radius: 6px; }
        .mode-btn { background: none; border: none; color: var(--text-muted); padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background-color: var(--bg-surface); color: var(--text-main); }
        
        .workspace-container { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 110px); overflow: hidden; }
        .canvas-viewport { flex: 1.1; background-color: #0d0d0f; display: flex; justify-content: center; align-items: center; position: relative; padding: 10px; }
        .upload-box { border: 2px dashed var(--border); padding: 20px; border-radius: 8px; text-align: center; background: var(--bg-panel); width: 80%; max-width: 280px; }
        
        /* GPU Accelerated Canvas Render */
        #mainCanvas { max-width: 100%; max-height: 95%; object-fit: contain; border-radius: 4px; display: none; cursor: crosshair; transform: translateZ(0); will-change: filter; }
        
        .sidebar-controls { flex: 1.3; background-color: var(--bg-panel); border-top: 1px solid var(--border); overflow-y: auto; padding: 12px; }
        .panel-content { display: none; }
        .panel-content.active { display: block; }
        .category-header-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; border-left: 2px solid var(--accent-blue); padding-left: 6px; }
        
        .control-group { margin-bottom: 10px; }
        .control-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .control-label { font-size: 12px; color: #e5e5ea; }
        .slider-wrapper { display: flex; align-items: center; gap: 8px; }
        .slider { flex: 1; -webkit-appearance: none; height: 4px; background: var(--bg-surface); border-radius: 2px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: white; }
        .slider-val { font-size: 11px; width: 30px; text-align: right; color: var(--text-muted); }
        
        .status-bar { font-size: 12px; color: #ffffff; background: var(--accent-purple); padding: 6px 10px; border-radius: 4px; margin-bottom: 10px; text-align: center; display: none; }

        .ai-prompt-box { background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-bottom: 10px; }
        .ai-input-wrapper { display: flex; align-items: center; gap: 6px; }
        .ai-input { flex: 1; background: transparent; border: none; color: white; font-size: 12px; outline: none; height: 35px; resize: none; }
        .voice-btn { background: none; border: none; font-size: 16px; cursor: pointer; }

        .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .ai-action-btn { background: var(--bg-surface); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; font-size: 12px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        .bottom-toolbar { height: 50px; background-color: var(--bg-main); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 5px; }
        .bottom-tab { color: var(--text-muted); padding: 0 16px; height: 100%; border: none; background: none; font-size: 12px; cursor: pointer; }
        .bottom-tab.active { color: var(--accent-blue); font-weight: 700; }
    </style>
</head>
<body>

    <header class="top-toolbar">
        <div class="mode-switch-group">
            <button class="mode-btn active" id="btnModeManual" onclick="switchMode('MANUAL')">Manual</button>
            <button class="mode-btn" id="btnModeAI" onclick="switchMode('AI')">✨ AI Edit</button>
        </div>
        <button style="background: var(--accent-blue); color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 600;" onclick="exportFinalImage()">Export</button>
    </header>

    <div class="workspace-container">
        <main class="canvas-viewport">
            <input type="file" id="fileLoader" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <div class="upload-box" id="uploadClickArea" onclick="document.getElementById('fileLoader').click()">
                <p style="font-size: 20px;">📸</p>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">Upload Photo</p>
            </div>
            <canvas id="mainCanvas" onmousedown="startObjectRemoval(event)" ontouchstart="startObjectRemoval(event)"></canvas>
        </main>

        <aside class="sidebar-controls">
            <div class="status-bar" id="aiStatus"></div>

            <!-- MANUAL PANEL -->
            <div class="panel-content active" id="panelManual">
                <h3 class="category-header-title" id="panelTitle">LIGHT CONTROLS</h3>
                <div id="dynamicSlidersContainer"></div>
            </div>

            <!-- AI PANEL -->
            <div class="panel-content" id="panelAI">
                <h3 class="category-header-title">Lite AI Engine</h3>
                
                <div class="ai-prompt-box">
                    <div class="ai-input-wrapper">
                        <textarea class="ai-input" id="aiTextPrompt" placeholder="Type 'sky' or 'hdr'..."></textarea>
                        <button class="voice-btn" id="micBtn" onclick="toggleVoiceRecognition()">🎙️</button>
                    </div>
                    <button style="background: var(--accent-purple); color: white; border: none; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; font-weight: 600; font-size: 12px;" onclick="runSmartVoicePrompt()">Process</button>
                </div>

                <div class="ai-grid">
                    <button class="ai-action-btn" onclick="triggerRealSkyReplace()"><span>🌅</span> Sky Replace</button>
                    <button class="ai-action-btn" onclick="activateObjectRemovalMode()"><span>🧹</span> Object Remove</button>
                    <button class="ai-action-btn" onclick="triggerRealHDR()"><span>🎨</span> AI Relight</button>
                    <button class="ai-action-btn" onclick="triggerRealUpscale()"><span>💎</span> AI Sharp</button>
                </div>
            </div>
        </aside>
    </div>

    <footer class="bottom-toolbar">
        <button class="bottom-tab active" onclick="switchTab('Light', this)">Light</button>
        <button class="bottom-tab" onclick="switchTab('Color', this)">Color</button>
    </footer>
