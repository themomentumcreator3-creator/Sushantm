<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { margin: 0; background: #121212; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { height: 50px; background: #1f1f1f; display: flex; padding: 10px; gap: 10px; }
        #canvas-container { flex: 1; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="addFilter('brightness')">Brighten (AI)</button>
        <button onclick="undo()">Undo</button>
        <button onclick="exportImage()">Export</button>
    </div>

    <div id="canvas-container">
        <canvas id="c"></canvas>
    </div>

    <script>
        // Canvas Setup
        const canvas = new fabric.Canvas('c', {
            width: 400,
            height: 500,
            backgroundColor: '#000'
        });

        // Image Loader (Non-Destructive)
        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                fabric.Image.fromURL(event.target.result, function(img) {
                    img.scaleToWidth(350);
                    canvas.add(img);
                });
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        // Feature: AI Brightness (One-tap)
        function addFilter(type) {
            let activeObj = canvas.getActiveObject();
            if(activeObj) {
                activeObj.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.2 }));
                activeObj.applyFilters();
                canvas.renderAll();
            }
        }

        // Undo (History System)
        function undo() {
            canvas.undo(); // Fabric.js manages this easily
        }

        function exportImage() {
            const dataURL = canvas.toDataURL({ format: 'jpeg', quality: 0.9 });
            const link = document.createElement('a');
            link.download = 'edited-photo.jpg';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
