<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #121212; color: #ccc; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        /* Pro Toolbar */
        .top-nav { height: 50px; background: #1f1f1f; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #333; }
        /* Workspace */
        .main-editor { display: flex; flex: 1; }
        /* Left/Right Panels */
        .sidebar { width: 280px; background: #181818; display: flex; flex-direction: column; overflow-y: auto; }
        /* Canvas Area */
        .viewport { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        /* Bottom Tab Bar */
        .bottom-nav { height: 60px; background: #1f1f1f; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; }
        .tab { font-size: 12px; cursor: pointer; color: #888; }
        .tab.active { color: #fff; }
    </style>
</head>
<body>
    <div class="top-nav">
        <span>QuantumEdit Pro</span>
        <button>Export</button>
    </div>
    <div class="main-editor">
        <div class="viewport">
            <canvas id="canvas"></canvas>
        </div>
        <div class="sidebar">
            <!-- Yahan sliders aayenge -->
            <div style="padding: 20px;">Exposure: <input type="range" style="width: 100%;"></div>
            <div style="padding: 20px;">Contrast: <input type="range" style="width: 100%;"></div>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="tab active">Light</div>
        <div class="tab">Color</div>
        <div class="tab">Effects</div>
        <div class="tab">AI Mode</div>
    </div>
</body>
</html>
