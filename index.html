<!DOCTYPE html>
<html>
<body>
    <!-- 1. File Upload Button -->
    <input type="file" id="imgInput" accept="image/*">
    
    <!-- 2. Image Container (The Viewport) -->
    <div id="container" style="width: 100%; height: 500px; border: 2px solid red; margin-top: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
        <img id="myImage" src="" style="max-width: 100%; max-height: 100%; display: none;">
    </div>

    <script>
        const input = document.getElementById('imgInput');
        const img = document.getElementById('myImage');

        input.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                // Use URL.createObjectURL for faster, more reliable rendering
                img.src = URL.createObjectURL(file);
                img.style.display = 'block';
                console.log("Image source set to:", img.src);
            }
        };
    </script>
</body>
</html>
