<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumEdit Pro - Free Ultimate Engine</title>
    <style>
        :root {
            --bg-main: #09090b;
            --bg-panel: #141417;
            --bg-surface: #222226;
            --accent-blue: #0a84ff;
            --accent-purple: #bf5af2;
            --text-main: #f4f4f5;
            --text-muted: #8e8e93;
            --border: #2c2c2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* TOOLBARS */
        .top-toolbar { height: 55px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .mode-switch-group { display: flex; background-color: var(--bg-main); padding: 2px; border-radius: 8px; border: 1px solid var(--border); }
        .mode-btn { background: none; border: none; color: var(--text-muted); padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .mode-btn.active { background-color: var(--bg-surface); color: var(--text-main); }
        
        /* WORKSPACE */
        .workspace-container { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 120px); overflow: hidden; }
        .canvas-viewport { flex: 1.1; background-color: #0d0d0f; display: flex; justify-content: center; align-items: center; position: relative; padding: 10px; }
        .upload-box { border: 2px dashed var(--border); padding: 25px; border-radius: 8px; text-align: center; background: var(--bg-panel); width: 85%; max-width: 300px; cursor: pointer; }
        .editor-image { max-width: 100%; max-height: 95%; object-fit: contain; border-radius: 4px; display: none; }
        
        /* CONTROLS */
        .sidebar-controls { flex: 1.3; background-color: var(--bg-panel); border-top: 1px solid var(--border); overflow-y: auto; padding: 15px; }
        .panel-content { display: none; }
        .panel-content.active { display: block; }
        .category-header-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; border-left: 2px solid var(--accent-blue); padding-left: 6px; }
        
        /* SLIDERS & BUTTONS */
        .control-group { margin-bottom: 14px; }
        .control-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .control-label { font-size: 13px; color: #e5e5ea; }
        .smart-ai-assist-btn { background: rgba(191, 90, 242, 0.12); border: 1px solid rgba(191, 90, 242, 0.35); color: #dcb4f9; font-size: 10px; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
        .slider-wrapper { display: flex; align-items: center; gap: 8px; }
        .slider { flex: 1; -webkit-appearance: none; height: 4px; background: var(--bg-surface); outline: none; border-radius: 2px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: white; }
        .slider-val { font-size: 11px; width: 35px; text-align: right; color: var(--text-muted); }
        
        /* AI BOX */
        .ai-prompt-box { background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 15px; }
        .ai-input-wrapper { display: flex; align-items: center; gap: 8px; }
        .ai-input { flex: 1; background: transparent; border: none; color: white; font-size: 13px; outline: none; height: 35px; resize: none; }
        .voice-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px; }
        .voice-btn.listening { animation: pulse 1s infinite; background: rgba(255,0,0,0.2); border-radius: 50%; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .bottom-toolbar { height: 60px; background-color: var(--bg-main); border-top: 1px solid var(--border); display: flex; align-items: center; overflow-x: auto; padding: 0 5px; }
        .bottom-tab { color: var(--text-muted); padding: 0 16px; height: 100%; border: none; background: none; font-size: 12px; flex-shrink: 0; display: flex; align-items: center; cursor: pointer; }
        .bottom-tab.active { color: var(--accent-blue); font-weight: 700; }
    </style>
</head>
<body>

    <header class="top-toolbar">
        <div class="mode-switch-group">
            <button class="mode-btn active" id="btnModeManual" onclick="switchMode('MANUAL')">Manual</button>
            <button class="mode-btn" id="btnModeAI" onclick="switchMode('AI')">✨ AI Edit</button>
        </div>
        <button style="background: var(--accent-blue); color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;" onclick="alert('High-Res File Exported!')">Export</button>
    </header>

    <div class="workspace-container">
        <main class="canvas-viewport">
            <input type="file" id="fileLoader" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <div class="upload-box" id="uploadClickArea" onclick="document.getElementById('fileLoader').click()">
                <p style="font-size: 22px;">📸</p>
                <p style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Tap to Upload Photo</p>
            </div>
            <img id="mainCanvas" class="editor-image">
        </main>

        <aside class="sidebar-controls">
            <!-- MANUAL PANEL -->
            <div class="panel-content active" id="panelManual">
                <h3 class="category-header-title" id="panelTitle">LIGHT CONTROLS</h3>
                <div id="dynamicSlidersContainer"></div>
            </div>

            <!-- AI PANEL -->
            <div class="panel-content" id="panelAI">
                <h3 class="category-header-title">Free AI Voice & Text Prompt</h3>
                <div class="ai-prompt-box">
                    <div class="ai-input-wrapper">
                        <textarea class="ai-input" id="aiTextPrompt" placeholder="Tap Mic and say 'Make it look like golden hour'..."></textarea>
                        <button class="voice-btn" id="micBtn" onclick="toggleVoiceRecognition()">🎙️</button>
                    </div>
                    <button style="background: var(--accent-purple); color: white; border: none; width: 100%; padding: 8px; margin-top: 8px; border-radius: 6px; font-weight: 600;" onclick="runFreeAISimulation()">Apply AI Style</button>
                </div>
            </div>
        </aside>
    </div>

    <footer class="bottom-toolbar">
        <button class="bottom-tab active" onclick="switchTab('Light', this)">Light</button>
        <button class="bottom-tab" onclick="switchTab('Color', this)">Color</button>
        <button class="bottom-tab" onclick="switchTab('Detail', this)">Detail</button>
    </footer>

    <script>
        let engineState = {
            hasImage: false,
            currentMode: 'MANUAL',
            activeTab: 'Light',
            sliders: {
                Light: [
                    { name: 'Exposure', min: 50, max: 150, val: 100, unit: '%', target: 'brightness', assist: 'Auto Fix' },
                    { name: 'Contrast', min: 50, max: 150, val: 100, unit: '%', target: 'contrast', assist: 'AI Optimize' },
                    { name: 'Highlights', min: 70, max: 130, val: 100, unit: '%', target: 'contrast', assist: 'AI Maximize' },
                    { name: 'Shadows', min: 70, max: 130, val: 100, unit: '%', target: 'brightness', assist: 'Recover AI' },
                    { name: 'Whites', min: 80, max: 120, val: 100, unit: '%', target: 'brightness', assist: 'Fix High' },
                    { name: 'Blacks', min: 60, max: 140, val: 100, unit: '%', target: 'contrast', assist: 'Deepen AI' }
                ],
                Color: [
                    { name: 'Saturation', min: 0, max: 200, val: 100, unit: '%', target: 'saturate', assist: 'Vivid AI' },
                    { name: 'Temperature', min: -40, max: 40, val: 0, unit: 'deg', target: 'hue-rotate', assist: 'AI Suggest' }
                ],
                Detail: [
                    { name: 'Sharpen (Blur)', min: 0, max: 8, val: 0, unit: 'px', target: 'blur', assist: 'AI Enhance' }
                ]
            }
        };

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('mainCanvas');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('uploadClickArea').style.display = 'none';
                    engineState.hasImage = true;
                    applyFilters();
                }
                reader.readAsDataURL(file);
            }
        }

        function renderSliders() {
            const container = document.getElementById('dynamicSlidersContainer');
            container.innerHTML = '';
            engineState.sliders[engineState.activeTab].forEach((slide, index) => {
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `
                    <div class="control-header">
                        <span class="control-label">${slide.name}</span>
                        <button class="smart-ai-assist-btn" onclick="triggerSmartAI(${index})">🪄 ${slide.assist}</button>
                    </div>
                    <div class="slider-wrapper">
                        <input type="range" class="slider" min="${slide.min}" max="${slide.max}" value="${slide.val}" oninput="updateValue(this, ${index})">
                        <span class="slider-val" id="val-${index}">${slide.val}${slide.unit}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateValue(el, index) {
            engineState.sliders[engineState.activeTab][index].val = el.value;
            document.getElementById(`val-${index}`).innerText = el.value + engineState.sliders[engineState.activeTab][index].unit;
            applyFilters();
        }

        function triggerSmartAI(index) {
            if(!engineState.hasImage) return alert("Pehle photo upload karo bhai!");
            let slide = engineState.sliders[engineState.activeTab][index];
            if(slide.name === 'Exposure') slide.val = 124;
            if(slide.name === 'Contrast') slide.val = 81;
            if(slide.name === 'Highlights') slide.val = 108;
            if(slide.name === 'Shadows') slide.val = 94;
            
            renderSliders();
            applyFilters();
        }

        function applyFilters() {
            if (!engineState.hasImage) return;
            let filterStr = "";
            Object.keys(engineState.sliders).forEach(cat => {
                engineState.sliders[cat].forEach(slide => {
                    if(slide.name === 'Shadows' || slide.name === 'Whites') {
                        filterStr += `brightness(${slide.val}%) `;
                    } else if(slide.name === 'Blacks' || slide.name === 'Highlights') {
                        filterStr += `contrast(${slide.val}%) `;
                    } else {
                        filterStr += `${slide.target}(${slide.val}${slide.unit}) `;
                    }
                });
            });
            document.getElementById('mainCanvas').style.filter = filterStr;
        }

        function switchMode(mode) {
            engineState.currentMode = mode;
            document.getElementById('btnModeManual').classList.toggle('active', mode === 'MANUAL');
            document.getElementById('btnModeAI').classList.toggle('active', mode === 'AI');
            document.getElementById('panelManual').classList.toggle('active', mode === 'MANUAL');
            document.getElementById('panelAI').classList.toggle('active', mode === 'AI');
        }

        function switchTab(tabName, btn) {
            engineState.activeTab = tabName;
            document.getElementById('panelTitle').innerText = `${tabName.toUpperCase()} CONTROLS`;
            document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            switchMode('MANUAL');
            renderSliders();
        }

        /* 🎙️ FREE NATIVE VOICE RECOGNITION ENGINE */
        let recognition;
        function toggleVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Aapka browser voice command support nahi karta. Google Chrome use karein!");

            if (!recognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    document.getElementById('micBtn').classList.add('listening');
                };

                recognition.onresult = (event) => {
                    const speechToText = event.results[0][0].transcript;
                    document.getElementById('aiTextPrompt').value = speechToText;
                };

                recognition.onend = () => {
                    document.getElementById('micBtn').classList.remove('listening');
                    recognition = null;
                };

                recognition.start();
            }
        }

        function runFreeAISimulation() {
            if(!engineState.hasImage) return alert("Pehle photo select karo!");
            const text = document.getElementById('aiTextPrompt').value.toLowerCase();
            if(text.includes("cinematic") || text.includes("golden hour")) {
                engineState.sliders.Light[0].val = 124; // Exposure
                engineState.sliders.Light[1].val = 81;  // Contrast
                engineState.sliders.Color[0].val = 130; // Saturation
            }
            renderSliders();
            applyFilters();
            alert("AI processed your voice/text command safely for free!");
        }

        renderSliders();
    </script>
</body>
</html>
