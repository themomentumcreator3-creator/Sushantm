<!-- Yeh code tumhare existing HTML ke neeche <script> tag mein jayega -->
<script>
    // 1. App State (Sabse Important: Sab kuch yahi se control hoga)
    const state = {
        activeTab: 'Light',
        filters: {
            exposure: 100, contrast: 100, saturation: 100, warmth: 0
        }
    };

    // 2. Tab Switching Engine
    function switchTab(tabName) {
        state.activeTab = tabName;
        // Sidebar update karo tab ke hisab se
        const sidebar = document.querySelector('.sidebar');
        if (tabName === 'Light') {
            sidebar.innerHTML = `
                <div style="padding: 20px;">Exposure: <input type="range" min="50" max="150" value="${state.filters.exposure}" oninput="updateFilter('exposure', this.value)"></div>
                <div style="padding: 20px;">Contrast: <input type="range" min="50" max="150" value="${state.filters.contrast}" oninput="updateFilter('contrast', this.value)"></div>
            `;
        } else if (tabName === 'Color') {
            sidebar.innerHTML = `
                <div style="padding: 20px;">Saturation: <input type="range" min="0" max="200" value="${state.filters.saturation}" oninput="updateFilter('saturation', this.value)"></div>
            `;
        }
    }

    // 3. Image Processing Engine (Fast & Free)
    function updateFilter(key, value) {
        state.filters[key] = value;
        const img = document.getElementById('mainImage');
        // CSS Filter hi asli engine hai - ye 0 lag deta hai!
        img.style.filter = `brightness(${state.filters.exposure}%) contrast(${state.filters.contrast}%) saturate(${state.filters.saturation}%)`;
    }

    // Tab buttons par click event lagao
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            switchTab(tab.innerText);
        });
    });

    // Default tab load karo
    switchTab('Light');
                </script>
