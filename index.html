<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumEdit Pro - Crash Proof Edition</title>
    <style>
        :root {
            --bg-main: #09090b;
            --bg-panel: #141417;
            --bg-surface: #222226;
            --accent-blue: #0a84ff;
            --accent-purple: #bf5af2;
            --text-main: #f4f4f5;
            --text-muted: #8e8e93;
            --border: #2c2c2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-toolbar { height: 48px; background-color: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 12px; }
        .mode-switch-group { display: flex; background-color: var(--bg-main); padding: 2px; border-radius: 6px; }
        .mode-btn { background: none; border: none; color: var(--text-muted); padding: 5px 10px; font-size: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background-color: var(--bg-surface); color: var(--text-main); }
        
        .workspace-container { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 108px); overflow: hidden; }
        .canvas-viewport { flex: 1.1; background-color: #0d0d0f; display: flex; justify-content: center; align-items: center; position: relative; padding: 8px; overflow: hidden; }
        
        .upload-box { border: 2px dashed var(--border); padding: 18px; border-radius: 8px; text-align: center; background: var(--bg-panel); width: 75%; max-width: 260px; cursor: pointer; }
        
        /* THE MAGIC TRICK: Offloading directly to Phone Display GPU */
        #mainCanvas { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; display: none; cursor: crosshair; transition: filter 0.1s ease-out; }
        
        .sidebar-controls { flex: 1.2; background-color: var(--bg-panel); border-top: 1px solid var(--border); overflow-y: auto; padding: 10px; }
        .panel-content { display: none; }
        .panel-content.active { display: block; }
        .category-header-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; border-left: 2px solid var(--accent-blue); padding-left: 6px; }
        
        .control-group { margin-bottom: 10px; }
        .control-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .control-label { font-size: 12px; color: #e5e5ea; }
        .slider-wrapper { display: flex; align-items: center; gap: 8px; }
        .slider { flex: 1; -webkit-appearance: none; height: 4px; background: var(--bg-surface); border-radius: 2px; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: white; }
        .slider-val { font-size: 11px; width: 28px; text-align: right; color: var(--text-muted); }
        
        .status-bar { font-size: 11px; color: #ffffff; background: var(--accent-purple); padding: 5px 8px; border-radius: 4px; margin-bottom: 8px; text-align: center; display: none; }
        
        .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .ai-action-btn { background: var(--bg-surface); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; font-size: 11px; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 6px; }

        .bottom-toolbar { height: 48px; background-color: var(--bg-main); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 4px; }
        .bottom-tab { color: var(--text-muted); padding: 0 14px; height: 100%; border: none; background: none; font-size: 12px; cursor: pointer; }
        .bottom-tab.active { color: var(--accent-blue); font-weight: 700; }
    </style>
</head>
<body>

    <header class="top-toolbar">
        <div class="mode-switch-group">
            <button class="mode-btn active" id="btnModeManual" onclick="switchMode('MANUAL')">Manual</button>
            <button class="mode-btn" id="btnModeAI" onclick="switchMode('AI')">✨ AI Features</button>
        </div>
        <button style="background: var(--accent-blue); color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;" onclick="exportFinalImage()">Export</button>
    </header>

    <div class="workspace-container">
        <main class="canvas-viewport">
            <input type="file" id="fileLoader" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <div class="upload-box" id="uploadClickArea" onclick="document.getElementById('fileLoader').click()">
                <p style="font-size: 18px;">📸</p>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Tap to Upload</p>
            </div>
            
            <canvas id="mainCanvas" onmousedown="handleCanvasTap(event)" ontouchstart="handleCanvasTap(event)"></canvas>
        </main>

        <aside class="sidebar-controls">
            <div class="status-bar" id="sysStatus"></div>

            <!-- MANUAL PANEL -->
            <div class="panel-content active" id="panelManual">
                <h3 class="category-header-title" id="panelTitle">LIGHT CONTROLS</h3>
                <div id="dynamicSlidersContainer"></div>
            </div>

            <!-- AI PANEL -->
            <div class="panel-content" id="panelAI">
                <h3 class="category-header-title">Safe AI Actions</h3>
                <div class="ai-grid">
                    <button class="ai-action-btn" onclick="applyHDR()"><span>🎨</span> Quick Relight</button>
                    <button class="ai-action-btn" onclick="applySunset()"><span>🌅</span> Sunset Warmth</button>
                    <button class="ai-action-btn" onclick="activateObjectRemoval()"><span>🧹</span> Object Erase</button>
                    <button class="ai-action-btn" onclick="resetAll()"><span>🔄</span> Reset Edits</button>
                </div>
            </div>
        </aside>
    </div>

    <footer class="bottom-toolbar">
        <button class="bottom-tab active" onclick="switchTab('Light', this)">Light</button>
        <button class="bottom-tab" onclick="switchTab('Color', this)">Color</button>
    </footer>

    <script>
        // System Config
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let originalImage = new Image();
        let isEraserActive = false;

        let state = {
            activeTab: 'Light',
            controls: {
                Light: [
                    { name: 'Brightness', type: 'brightness', min: 50, max: 150, val: 100 },
                    { name: 'Contrast', type: 'contrast', min: 50, max: 150, val: 100 }
                ],
                Color: [
                    { name: 'Saturation', type: 'saturate', min: 0, max: 200, val: 100 },
                    { name: 'Warmth', type: 'sepia', min: 0, max: 100, val: 0 }
                ]
            }
        };

        // 1. UPLOAD (Safe Resize to prevent Memory Crash)
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                originalImage.src = e.target.result;
                originalImage.onload = function() {
                    let w = originalImage.width;
                    let h = originalImage.height;
                    
                    // Cap at 800px strictly
                    if (w > 800 || h > 800) {
                        if (w > h) { h = (h * 800) / w; w = 800; }
                        else { w = (w * 800) / h; h = 800; }
                    }
                    
                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(originalImage, 0, 0, w, h);
                    
                    canvas.style.display = 'block';
                    document.getElementById('uploadClickArea').style.display = 'none';
                    resetAll();
                    showStatus("✅ Image Loaded Fast & Safely!");
                }
            }
            reader.readAsDataURL(file);
        }

        // 2. RENDER SLIDERS
        function renderSliders() {
            const container = document.getElementById('dynamicSlidersContainer');
            container.innerHTML = '';
            state.controls[state.activeTab].forEach((control, index) => {
                let displayVal = control.val - (control.type === 'sepia' ? 0 : 100);
                
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `
                    <div class="control-header"><span class="control-label">${control.name}</span></div>
                    <div class="slider-wrapper">
                        <input type="range" class="slider" min="${control.min}" max="${control.max}" value="${control.val}" oninput="updateCSSFilter(this, ${index})">
                        <span class="slider-val" id="val-${index}">${displayVal > 0 ? '+' : ''}${displayVal}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 3. ZERO-LAG CSS HARDWARE RENDERER (Never crashes)
        function updateCSSFilter(el, index) {
            let activeConfig = state.controls[state.activeTab][index];
            activeConfig.val = parseInt(el.value);
            
            let displayVal = activeConfig.val - (activeConfig.type === 'sepia' ? 0 : 100);
            document.getElementById(`val-${index}`).innerText = (displayVal > 0 ? '+' : '') + displayVal;
            
            applyCSS();
        }

        function applyCSS() {
            // Hum sidhe HTML canvas element par CSS filter laga rahe hain. CPU use nahi hoga!
            let bright = state.controls.Light[0].val;
            let cont = state.controls.Light[1].val;
            let sat = state.controls.Color[0].val;
            let sepia = state.controls.Color[1].val;
            
            canvas.style.filter = `brightness(${bright}%) contrast(${cont}%) saturate(${sat}%) sepia(${sepia}%)`;
        }

        // 4. SAFE UI SWITCHES
        function switchTab(tabName, btn) {
            state.activeTab = tabName;
            document.getElementById('panelTitle').innerText = `${tabName.toUpperCase()} CONTROLS`;
            document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            switchMode('MANUAL');
            renderSliders();
        }

        function switchMode(mode) {
            isEraserActive = false;
            document.getElementById('btnModeManual').classList.toggle('active', mode === 'MANUAL');
            document.getElementById('btnModeAI').classList.toggle('active', mode === 'AI');
            document.getElementById('panelManual').classList.toggle('active', mode === 'MANUAL');
            document.getElementById('panelAI').classList.toggle('active', mode === 'AI');
        }

        function showStatus(msg) {
            let bar = document.getElementById('sysStatus');
            bar.innerText = msg; bar.style.display = 'block';
            setTimeout(() => { if(bar.innerText === msg) bar.style.display = 'none'; }, 2000);
        }

        // 5. ONE-CLICK PRESETS (No heavy processing)
        function applyHDR() {
            state.controls.Light[0].val = 110;
            state.controls.Light[1].val = 115;
            state.controls.Color[0].val = 110;
            applyCSS(); showStatus("🎨 Relight Applied!");
        }

        function applySunset() {
            state.controls.Color[0].val = 120;
            state.controls.Color[1].val = 30; // sepia warmth
            applyCSS(); showStatus("🌅 Sunset Tone Applied!");
        }

        function resetAll() {
            state.controls.Light[0].val = 100;
            state.controls.Light[1].val = 100;
            state.controls.Color[0].val = 100;
            state.controls.Color[1].val = 0;
            applyCSS(); renderSliders(); showStatus("🔄 Reset to original");
        }

        // 6. OBJECT REMOVAL (Basic clone stamp, very light)
        function activateObjectRemoval() {
            isEraserActive = true;
            showStatus("🧹 Eraser Ready: Tap on background spots.");
        }

        function handleCanvasTap(event) {
            if (!isEraserActive) return;
            event.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            let clientX = event.clientX || (event.touches && event.touches[0].clientX);
            let clientY = event.clientY || (event.touches && event.touches[0].clientY);
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);

            let r = 15; 
            ctx.drawImage(canvas, x - r - 20, y - r, r * 2, r * 2, x - r, y - r, r * 2, r * 2);
            showStatus("✨ Area Cleaned");
        }

        // 7. EXPORT (Finalize CSS to Image)
        function exportFinalImage() {
            if (canvas.style.display === 'none') return;
            showStatus("⏳ Saving...");
            
            setTimeout(() => {
                // Create a temporary canvas to burn the CSS filters into actual pixels for downloading
                let expCanvas = document.createElement('canvas');
                expCanvas.width = canvas.width;
                expCanvas.height = canvas.height;
                let expCtx = expCanvas.getContext('2d');
                
                expCtx.filter = canvas.style.filter; // apply css filter to drawing context
                expCtx.drawImage(canvas, 0, 0);
                
                const link = document.createElement('a');
                link.download = 'QuantumEdit_Safe.jpg';
                link.href = expCanvas.toDataURL("image/jpeg", 0.9);
                link.click();
                showStatus("✅ Image Saved!");
            }, 100);
        }

        renderSliders();
    </script>
</body>
</html>
