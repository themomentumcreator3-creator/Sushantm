<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .canvas-container { position: relative; display: inline-block; }
        #skyOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 40%; background: orange; mix-blend-mode: overlay; opacity: 0; pointer-events: none; }
        .btn { padding: 10px; background: #333; color: white; border: none; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <input type="file" id="upload" accept="image/*">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="skyOverlay"></div>
    </div>
    <br>
    <button class="btn" onclick="applySky()">Sky Replace</button>
    <button class="btn" onclick="applyHDR()">HDR Relight</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('skyOverlay');

        document.getElementById('upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = 400; // Fixed size to prevent lag
                    canvas.height = (img.height * 400) / img.width;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function applySky() {
            overlay.style.opacity = "0.6"; // Light effect, no CPU load
            console.log("Sky applied");
        }

        function applyHDR() {
            canvas.style.filter = "contrast(1.5) brightness(1.2)"; // GPU effect, no lag
            console.log("HDR applied");
        }
    </script>
</body>
</html>
